name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          dir: "C:\\Qt"
          modules: "qtmultimedia qtimageformats"

      - name: Configure vcpkg
        shell: pwsh
        run: |
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:QT_ROOT_DIR)) {
            throw "QT_ROOT_DIR was not exported by install-qt-action."
          }
          $qtRoot = Split-Path -Parent $env:QT_ROOT_DIR
          .\scripts\package.ps1 -Preset windows-msvc-release -QtRoot $qtRoot -VcpkgRoot $env:VCPKG_ROOT

      - name: Rename installer
        id: package
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME } else { "manual" }
          $artifact = "PNG-Studio-$tag-windows-x64-setup.exe"
          Move-Item -LiteralPath "out\PNG-Studio-Setup.exe" -Destination "out\$artifact" -Force
          "artifact=out/$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.artifact }}
          generate_release_notes: true
