model: Qwen/Qwen3-ASR-0.6B
base:
  - key: cstr/qwen3-asr-0.6b-gguf
    role: model
    name: Qwen3-ASR Model
    purpose: Core 0.6B ASR model in GGUF format
    defaultFile: qwen3-asr-0.6b-q4_k.gguf
    sources:
      - type: huggingface
        user: cstr
        repo: qwen3-asr-0.6b-GGUF
        files:
          - name: qwen3-asr-0.6b-q4_k.gguf
            size: 500 MB
metadataOverrides:
  domain: stt
  architectures:
    - qwen3-asr
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 600M
  capabilities:
    - stt
  vision: false
laStudio:
  id: qwen3-asr-0.6b
  type: stt
  localDir: qwen3-asr-0.6b
  shortName: Q3A6
  title: Qwen3-ASR 0.6B
  subtitle: Lightweight speech-LLM transcription
  description: Lightweight Qwen3-ASR model for offline multilingual speech transcription and audio Q&A, using the CrispASR runtime.
  accent: "#27a99a"
  capabilities:
    - stt
  supportsStt: true
  tags:
    - GGUF
    - Offline
    - Multilingual
    - 0.6B
    - Speech-LLM
  supportedLanguageSetId: whisper-v1
  supportedLanguageCount: 100
  parameterDefinitions:
    temperature:
      name: Temperature
      type: float
      min: 0.0
      max: 2.0
      default: 0.0
      description: Initial sampling temperature. 0.0 for greedy decoding.
    seed:
      name: Seed
      type: int
      min: 0
      max: 2147483647
      default: 0
      description: Random seed for reproducibility. 0 for random.
    max_new_tokens:
      name: Max New Tokens
      type: int
      min: 0
      max: 4096
      default: 0
      description: Maximum number of tokens to generate. 0 for model default.
      advanced: true
    beam_size:
      name: Beam Size
      type: int
      min: 1
      max: 20
      default: 1
      description: Number of beams for beam search. 1 disables beam search.
      advanced: true
    top_p:
      name: Top P
      type: float
      min: 0.0
      max: 1.0
      default: 0.95
      description: Top-p sampling threshold.
      advanced: true
    ask:
      name: Audio Q&A Prompt
      type: string
      default: ""
      description: Free-form prompt for audio Q&A. Leave empty for standard transcription.
  runtimes:
    - id: crispasr-win-x86_64-cpu
      engineFamily: crispasr
      label: CPU
      name: CPU CrispASR (x64)
      asset: libcrispasr-windows-x86_64.tar.gz
      version: v0.8.4
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3
    - id: crispasr-win-x86_64-cuda
      engineFamily: crispasr
      label: CUDA
      name: CUDA CrispASR (x64)
      asset: libcrispasr-windows-x86_64-cuda.tar.gz
      version: v0.8.4
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3
    - id: crispasr-win-x86_64-vulkan
      engineFamily: crispasr
      label: Vulkan
      name: Vulkan CrispASR (x64)
      asset: libcrispasr-windows-x86_64-vulkan.tar.gz
      version: v0.8.4
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3
  studio:
    stt:
      layout: stt
      action: transcribe
      inputs:
        - audio
        - language
      parameters:
        - temperature
        - seed
        - max_new_tokens
        - beam_size
        - top_p
        - ask
