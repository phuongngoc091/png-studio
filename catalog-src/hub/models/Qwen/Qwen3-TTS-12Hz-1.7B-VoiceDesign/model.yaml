metadataOverrides:
  domain: tts
  architectures:
    - qwen2.5-tts
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 1.7B
  capabilities:
    - voice-design
  vision: false
laStudio:
  id: qwen3-tts-1.7b-voicedesign
  type: tts
  localDir: qwen3-tts-1.7b-voicedesign
  shortName: Q3D
  title: Qwen3-TTS 1.7B VoiceDesign
  subtitle: Voice generation from descriptions
  description: Qwen3-TTS model specialized in zero-shot voice design from text instructions. Outputs high-fidelity 24kHz audio matching your style descriptions.
  accent: "#ab47bc"
  capabilities:
    - voice-design
  supportsTts: false
  supportsCloning: false
  tags:
    - GGUF
    - High-Fidelity
    - VoiceDesign
    - 1.7B
  supportedLanguages:
    - text: Chinese (zh)
      value: zh
    - text: English (en)
      value: en
    - text: Japanese (ja)
      value: ja
    - text: Korean (ko)
      value: ko
    - text: German (de)
      value: de
    - text: French (fr)
      value: fr
    - text: Russian (ru)
      value: ru
    - text: Portuguese (pt)
      value: pt
    - text: Spanish (es)
      value: es
    - text: Italian (it)
      value: it
  parameterDefinitions:
    temperature:
      name: Temperature
      type: float
      min: 0.1
      max: 2.0
      default: 0.9
      description: Randomness of the generation.
    seed:
      name: Seed
      type: int
      min: -1
      max: 2147483647
      default: -1
      description: Random seed for reproducibility. -1 for random.
    length_scale:
      name: Length Scale
      type: float
      min: 0.25
      max: 4.0
      default: 1.0
      description: Duration multiplier. Values above 1.0 speak slower; below 1.0 speak faster.
    max_codec_steps:
      name: Max Codec Steps
      type: int
      min: 16
      max: 400
      default: 100
      description: Maximum number of steps for the audio codec decoder. Equivalent to QWEN3_TTS_MAX_FRAMES.
      advanced: true
  runtimes:
    - id: crispasr-win-x86_64-cpu
      engineFamily: crispasr
      label: CPU
      name: CPU CrispASR (x64)
      asset: libcrispasr-windows-x86_64.tar.gz
      version: v0.7.2
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3-tts
    - id: crispasr-win-x86_64-cpu
