model: Qwen/Qwen3-TTS-12Hz-0.6B-Base
base:
  - key: cstr/qwen3-tts-0.6b-base-gguf
    role: model
    name: Qwen3-TTS Model
    purpose: Core 0.6B Base model
    defaultFile: qwen3-tts-12hz-0.6b-base-q8_0.gguf
    sources:
      - type: huggingface
        user: cstr
        repo: qwen3-tts-0.6b-base-GGUF
        files:
          - name: qwen3-tts-12hz-0.6b-base-q4_k.gguf
            size: 533 MB
          - name: qwen3-tts-12hz-0.6b-base-q8_0.gguf
            size: 650 MB
          - name: qwen3-tts-12hz-0.6b-base.gguf
  - key: cstr/qwen3-tts-tokenizer-12hz-gguf
    role: tokenizer
    name: Audio Codec
    purpose: 12Hz Audio Tokenizer
    defaultFile: qwen3-tts-tokenizer-12hz.gguf
    sources:
      - type: huggingface
        user: cstr
        repo: qwen3-tts-tokenizer-12hz-GGUF
        files:
          - name: qwen3-tts-tokenizer-12hz.gguf
            size: 700 MB
metadataOverrides:
  domain: tts
  architectures:
    - qwen2.5-tts
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 600M
  capabilities:
    - voice-cloning
  vision: false
laStudio:
  id: qwen3-tts-0.6b-base
  type: tts
  localDir: qwen3-tts-0.6b-base
  shortName: Q3B6
  title: Qwen3-TTS Base 0.6B
  subtitle: Fast zero-shot voice cloning
  description: Lightweight Qwen3-TTS base model for fast zero-shot voice cloning from reference audio. Requires 24kHz reference WAV and transcript.
  accent: "#f5a623"
  capabilities:
    - voice-cloning
  supportsTts: false
  supportsCloning: true
  tags:
    - GGUF
    - Voice-Cloning
    - Fast
    - 0.6B
  supportedLanguages:
    - text: Chinese (zh)
      value: zh
    - text: English (en)
      value: en
    - text: Japanese (ja)
      value: ja
    - text: Korean (ko)
      value: ko
    - text: German (de)
      value: de
    - text: French (fr)
      value: fr
    - text: Russian (ru)
      value: ru
    - text: Portuguese (pt)
      value: pt
    - text: Spanish (es)
      value: es
    - text: Italian (it)
      value: it
  parameterDefinitions:
    temperature:
      name: Temperature
      type: float
      min: 0.1
      max: 2.0
      default: 1.0
      description: Randomness of the generation.
    seed:
      name: Seed
      type: int
      min: -1
      max: 2147483647
      default: -1
      description: Random seed for reproducibility.
    max_codec_steps:
      name: Max Codec Steps
      type: int
      min: 0
      max: 200
      default: 0
      description: Maximum number of audio codec frames. Set to 0 to size automatically from the prompt.
      advanced: true
  runtimes:
    - id: crispasr-win-x86_64-cpu
      engineFamily: crispasr
      label: CPU
      name: CPU CrispASR (x64)
      asset: libcrispasr-windows-x86_64.tar.gz
      version: v0.8.6
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3-tts
    - id: crispasr-win-x86_64-cuda
      engineFamily: crispasr
      label: CUDA
      name: CUDA CrispASR (x64)
      asset: libcrispasr-windows-x86_64-cuda.tar.gz
      version: v0.8.6
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3-tts
    - id: crispasr-win-x86_64-vulkan
      engineFamily: crispasr
      label: Vulkan
      name: Vulkan CrispASR (x64)
      asset: libcrispasr-windows-x86_64-vulkan.tar.gz
      version: v0.8.6
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: qwen3-tts
  studio:
    voice-cloning:
      layout: voice-cloning
      parameters:
        - temperature
        - seed
        - max_codec_steps
