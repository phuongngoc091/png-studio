    purpose: Core 1.7B Base model
    defaultFile: qwen3-tts-12hz-1.7b-base-q8_0.gguf
    sources:
      - type: huggingface
        user: cstr
        repo: qwen3-tts-1.7b-base-GGUF
        files:
          - name: qwen3-tts-12hz-1.7b-base-q8_0.gguf
            size: 1.8 GB
          - name: qwen3-tts-12hz-1.7b-base.gguf
  - key: cstr/qwen3-tts-tokenizer-12hz-gguf
    role: tokenizer
