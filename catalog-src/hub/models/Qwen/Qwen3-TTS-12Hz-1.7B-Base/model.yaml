metadataOverrides:
  domain: tts
  architectures:
    - qwen2.5-tts
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 1.7B
  capabilities:
    - voice-cloning
  vision: false
laStudio:
  id: qwen3-tts-1.7b-base
  type: tts
  localDir: qwen3-tts-1.7b-base
  shortName: Q3B17
  title: Qwen3-TTS Base 1.7B
  subtitle: High-fidelity zero-shot voice cloning
  description: High-fidelity Qwen3-TTS base model for zero-shot voice cloning from reference audio. Provides better prosody and quality than 0.6B.
  accent: "#bd10e0"
  capabilities:
    - voice-cloning
  supportsTts: false
  supportsCloning: true
  tags:
    - GGUF
    - Voice-Cloning
    - High-Fidelity
    - 1.7B
  supportedLanguages:
    - text: Chinese (zh)
      value: zh
    - text: English (en)
      value: en
    - text: Japanese (ja)
      value: ja
    - text: Korean (ko)
      value: ko
  parameterDefinitions:
    temperature:
      name: Temperature
      type: float
      min: 0.1
      max: 2.0
      default: 1.0
      description: Randomness of the generation.
    seed:
      name: Seed
      type: int
      min: -1
      max: 2147483647
      default: -1
      description: Random seed for reproducibility.
    max_codec_steps:
      name: Max Codec Steps
      type: int
      min: 1
      max: 200
      default: 100
      description: Maximum number of steps for the audio codec decoder.
      advanced: true
  runtimes:
