  runtimes:
    - id: omnivoice.cpp-win-x86_64-cpu
      engineFamily: omnivoice.cpp
      label: CPU
      name: CPU Omnivoice (x64)
      asset: omnivoice-win-cpu.zip
      library: omnivoice.dll
      version: v0.1.3
      source: https://github.com/dduongtrandai/omnivoice.cpp/releases/download/
      type: tts
    - id: omnivoice.cpp-win-x86_64-cuda-12
      engineFamily: omnivoice.cpp
      label: CUDA 12
      name: CUDA 12 Omnivoice (x64)
      asset: omnivoice-win-cuda-12.zip
      library: omnivoice.dll
      version: v0.1.3
      source: https://github.com/dduongtrandai/omnivoice.cpp/releases/download/
      type: tts
    - id: omnivoice.cpp-win-x86_64-vulkan
      engineFamily: omnivoice.cpp
