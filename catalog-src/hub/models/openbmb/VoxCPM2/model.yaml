model: openbmb/VoxCPM2
base:
  - key: cstr/voxcpm2-gguf
    role: model
    name: VoxCPM2 GGUF
    purpose: Tokenizer-free multilingual TTS and voice-cloning model
    defaultFile: voxcpm2-q4_k.gguf
    sources:
      - type: huggingface
        user: cstr
        repo: voxcpm2-GGUF
        files:
          - name: voxcpm2-q4_k.gguf
            size: 1.5 GB
            tags:
              - q4_k
          - name: voxcpm2-f16.gguf
            size: 4.63 GB
            tags:
              - f16
metadataOverrides:
  domain: tts
  architectures:
    - voxcpm2
  compatibilityTypes:
    - gguf
  paramsStrings:
    - 2B
  capabilities:
    - tts
    - voice-cloning
    - voice-design
  vision: false
laStudio:
  id: voxcpm2
  type: tts
  localDir: voxcpm2
  shortName: V2
  title: VoxCPM2
  subtitle: 30-language TTS, voice design, and cloning
  description: Tokenizer-free 2B multilingual TTS model with 48kHz output, natural-language voice design, and zero-shot voice cloning via reference WAV.
  accent: "#2d7dd2"
  capabilities:
    - tts
    - voice-cloning
    - voice-design
  supportsTts: true
  supportsCloning: true
  tags:
    - GGUF
    - Multilingual
    - Voice Cloning
    - Voice Design
    - 48 kHz
    - 2B
  supportedLanguageCount: 30
  supportedLanguages:
    - text: Arabic (ar)
      value: ar
    - text: Burmese (my)
      value: my
    - text: Chinese (zh)
      value: zh
    - text: Danish (da)
      value: da
    - text: Dutch (nl)
      value: nl
    - text: English (en)
      value: en
    - text: Finnish (fi)
      value: fi
    - text: French (fr)
      value: fr
    - text: German (de)
      value: de
    - text: Greek (el)
      value: el
    - text: Hebrew (he)
      value: he
    - text: Hindi (hi)
      value: hi
    - text: Indonesian (id)
      value: id
    - text: Italian (it)
      value: it
    - text: Japanese (ja)
      value: ja
    - text: Khmer (km)
      value: km
    - text: Korean (ko)
      value: ko
    - text: Lao (lo)
      value: lo
    - text: Malay (ms)
      value: ms
    - text: Norwegian (no)
      value: no
    - text: Polish (pl)
      value: pl
    - text: Portuguese (pt)
      value: pt
    - text: Russian (ru)
      value: ru
    - text: Spanish (es)
      value: es
    - text: Swahili (sw)
      value: sw
    - text: Swedish (sv)
      value: sv
    - text: Tagalog (tl)
      value: tl
    - text: Thai (th)
      value: th
    - text: Turkish (tr)
      value: tr
    - text: Vietnamese (vi)
      value: vi
  strengths:
    - 30-language multilingual synthesis without language tags
    - Natural-language voice design through the upstream parenthesized prompt format
    - Zero-shot reference-audio voice cloning
    - 48 kHz mono output
  weaknesses:
    - Large 2B model footprint
    - VoxCPM2 support requires CrispASR v0.7.1 or newer
    - CrispASR does not expose a separate VoxCPM2 instruct API; voice design is encoded in the synthesis text
  parameterDefinitions:
    seed:
      name: Seed
      type: int
      min: -1
      max: 2147483647
      default: -1
      description: Random seed for reproducibility. -1 for random.
    instruct:
      name: Voice Description
      type: string
      default: ""
      description: VoxCPM2 voice design description encoded in the upstream parenthesized prompt format.
  runtimes:
    - id: crispasr-win-x86_64-cpu
      engineFamily: crispasr
      label: CPU
      name: CPU CrispASR (x64)
      asset: libcrispasr-windows-x86_64.tar.gz
      version: v0.7.1
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: voxcpm2-tts
      modelVersion: VoxCPM2 GGUF
    - id: crispasr-win-x86_64-cuda
      engineFamily: crispasr
      label: CUDA
      name: CUDA CrispASR (x64)
      asset: libcrispasr-windows-x86_64-cuda.tar.gz
      version: v0.7.1
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: voxcpm2-tts
      modelVersion: VoxCPM2 GGUF
    - id: crispasr-win-x86_64-vulkan
      engineFamily: crispasr
      label: Vulkan
      name: Vulkan CrispASR (x64)
      asset: libcrispasr-windows-x86_64-vulkan.tar.gz
      version: v0.7.1
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: voxcpm2-tts
      modelVersion: VoxCPM2 GGUF
    - id: crispasr-win-x86_64-cpu-legacy
      engineFamily: crispasr
      label: CPU Legacy
      name: Legacy CPU CrispASR (x64)
      asset: libcrispasr-windows-x86_64-cpu-legacy.tar.gz
      version: v0.7.1
      source: https://github.com/CrispStrobe/CrispASR/releases/download/
      library: bin/crispasr.dll
      backend: voxcpm2-tts
      modelVersion: VoxCPM2 GGUF
  studio:
    tts:
      layout: tts
      action: synthesize
      inputs:
        - text
        - language
      parameters:
        - seed
        - instruct
    voice-cloning:
      layout: voice-cloning
      action: clone
      inputs:
        - text
        - language
        - referenceAudio
      requiredInputs:
        - text
        - referenceAudio
      parameters:
        - seed
        - instruct
    voice-design:
      layout: voice-design
      action: design
      inputs:
        - text
        - language
        - instruct
      requiredInputs:
        - text
        - instruct
      parameters:
        - seed
        - instruct
