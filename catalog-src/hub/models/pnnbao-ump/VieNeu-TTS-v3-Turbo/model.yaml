model: pnnbao-ump/VieNeu-TTS-v3-Turbo
base:
  - key: pnnbao-ump/vieneu-v3-config
    role: config
    name: VieNeu v3 Config
    purpose: Model architecture and token id configuration
    defaultFile: config.json
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: config.json
            size: 1.6 KB
  - key: pnnbao-ump/vieneu-v3-tokenizer
    role: tokenizer
    name: VieNeu v3 Tokenizer
    purpose: Byte-level BPE phoneme tokenizer
    defaultFile: tokenizer.json
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: tokenizer.json
            size: 22 KB
  - key: pnnbao-ump/vieneu-v3-prefill
    role: prefill
    name: VieNeu v3 Prefill ONNX
    purpose: Transformer prompt prefill graph
    defaultFile: onnx/vieneu_prefill.onnx
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: onnx/vieneu_prefill.onnx
            size: 324 KB
  - key: pnnbao-ump/vieneu-v3-decode-step
    role: decode_step
    name: VieNeu v3 Decode Step ONNX
    purpose: Autoregressive transformer decode step graph
    defaultFile: onnx/vieneu_decode_step.onnx
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: onnx/vieneu_decode_step.onnx
            size: 306 KB
  - key: pnnbao-ump/vieneu-v3-acoustic
    role: acoustic
    name: VieNeu v3 Acoustic ONNX
    purpose: Cached acoustic token generation graph
    defaultFile: onnx/vieneu_acoustic_cached.onnx
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: onnx/vieneu_acoustic_cached.onnx
            size: 14 MB
  - key: pnnbao-ump/vieneu-v3-shared-data
    role: backbone_data
    name: VieNeu v3 Shared ONNX Data
    purpose: External ONNX tensor data for the transformer graphs
    defaultFile: onnx/vieneu_backbone_shared.data
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: onnx/vieneu_backbone_shared.data
            size: 396 MB
  - key: pnnbao-ump/vieneu-v3-heads
    role: heads
    name: VieNeu v3 Heads NPZ
    purpose: Text/audio embeddings and tied output heads
    defaultFile: onnx/vieneu_v3_heads.npz
    sources:
      - type: huggingface
        user: pnnbao-ump
        repo: VieNeu-TTS-v3-Turbo
        files:
          - name: onnx/vieneu_v3_heads.npz
            size: 25 MB
  - key: openmoss/moss-codec-decode
    role: codec_decode
    name: MOSS Audio Tokenizer Decoder ONNX
    purpose: Decode generated MOSS audio codes into 48 kHz waveform
    defaultFile: moss_audio_tokenizer_decode_full.onnx
    sources:
      - type: huggingface
        user: OpenMOSS-Team
        repo: MOSS-Audio-Tokenizer-Nano-ONNX
        files:
          - name: moss_audio_tokenizer_decode_full.onnx
            size: unknown
  - key: openmoss/moss-codec-encode
    role: codec_encode
    name: MOSS Audio Tokenizer Encoder ONNX
    purpose: Encode reference audio into MOSS audio codes for voice cloning
    defaultFile: moss_audio_tokenizer_encode.onnx
    sources:
      - type: huggingface
        user: OpenMOSS-Team
        repo: MOSS-Audio-Tokenizer-Nano-ONNX
        files:
          - name: moss_audio_tokenizer_encode.onnx
            size: unknown
metadataOverrides:
  domain: tts
  architectures:
    - vieneu-v3-turbo
  compatibilityTypes:
    - onnx
  paramsStrings:
    - 131M
  capabilities:
    - tts
    - voice-cloning
  vision: false
laStudio:
  id: vieneu-tts-v3-turbo
  type: tts
  localDir: vieneu-tts-v3-turbo
  shortName: VN3
  title: VieNeu-TTS v3 Turbo
  subtitle: 48 kHz Vietnamese-English TTS & cloning
  description: VieNeu-TTS v3 Turbo is a Vietnamese-English TTS model with preset voices, reference-audio cloning, and a CPU ONNX runtime path.
  accent: "#ff9100"
  capabilities:
    - tts
    - voice-cloning
  supportsTts: true
  supportsCloning: true
  tags:
    - ONNX
    - Vietnamese
    - Voice Cloning
    - 48 kHz
  strengths:
    - CPU ONNX runtime path
    - Built-in preset voices
    - Reference-audio cloning
    - English-Vietnamese code switching
  weaknesses:
    - Early access upstream model
    - Native C++ generation support is still under active implementation
  supportedLanguages:
    - text: Vietnamese (vi)
      value: vi
    - text: English (en)
      value: en
  parameterDefinitions:
    voice:
      name: Voice
      type: choice
      description: Select a VieNeu v3 preset voice when voices_v3_turbo.json is installed.
    temperature:
      name: Temperature
      type: float
      min: 0.1
      max: 2.0
      default: 0.8
      description: "Randomness of generation. Recommended: around 0.8 for v3 Turbo."
    top_k:
      name: Top K
      type: int
      min: 1
      max: 100
      default: 25
      description: Limit token selection to top K candidates.
    top_p:
      name: Top P
      type: float
      min: 0.0
      max: 1.0
      default: 0.95
      description: Nucleus sampling threshold.
    max_new_frames:
      name: Max New Frames
      type: int
      min: 16
      max: 1200
      default: 300
      description: Maximum generated acoustic frames per chunk.
      advanced: true
    repetition_penalty:
      name: Repetition Penalty
      type: float
      min: 1.0
      max: 2.0
      default: 1.2
      description: Penalize repeated audio codes.
      advanced: true
    max_chars:
      name: Max Chars
      type: int
      min: 50
      max: 1000
      default: 384
      description: Maximum characters per text segment.
      advanced: true
    apply_watermark:
      name: Apply Watermark
      type: bool
      default: true
      description: Request watermarking when supported by the runtime.
      advanced: true
  runtimes:
    - id: speech-lm-tts.cpp-win-x86_64-cpu
      engineFamily: speech-lm-tts.cpp
      backend: speech-lm-tts.cpp
      pipelineProfile: vieneu-v3-onnx
      label: CPU
      name: CPU speech-lm-tts.cpp VieNeu v3 ONNX (x64)
      asset: speech-lm-tts-win-cpu.zip
      library: speechlm-tts.dll
      version: v0.1.1
      source: https://github.com/dduongtrandai/speech-lm-tts.cpp/releases/download/
  studio:
    tts:
      layout: tts
      action: synthesize
      inputs:
        - text
      parameters:
        - voice
        - temperature
        - top_k
        - top_p
        - max_new_frames
        - repetition_penalty
        - max_chars
        - apply_watermark
    voice-cloning:
      layout: voice-cloning
      action: clone
      inputs:
        - text
        - ref_audio
      parameters:
        - temperature
        - top_k
        - top_p
        - max_new_frames
        - repetition_penalty
        - max_chars
        - apply_watermark
