model: lastudio-community/VieNeu-TTS-v3-Turbo-CPP
base:
  - key: lastudio-community/vieneu-v3-config
    role: config
    name: VieNeu v3 Config
    purpose: Model architecture and token id configuration
    defaultFile: config.json
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: config.json
            size: 1.6 KB
  - key: lastudio-community/vieneu-v3-tokenizer
    role: tokenizer
    name: VieNeu v3 Tokenizer
    purpose: Byte-level BPE phoneme tokenizer
    defaultFile: tokenizer.json
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: tokenizer.json
            size: 22 KB
  - key: lastudio-community/vieneu-v3-native-backbone
    role: model
    name: VieNeu v3 Native Backbone GGUF
    purpose: Native semantic backbone for the v3_native pipeline
    defaultFile: backbone.gguf
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: backbone.gguf
            size: 398 MB
  - key: lastudio-community/vieneu-v3-heads
    role: heads
    name: VieNeu v3 Native Heads NPZ
    purpose: Text/audio embeddings and tied output heads for the v3_native pipeline
    defaultFile: vieneu_v3_heads.npz
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: vieneu_v3_heads.npz
            size: 49 MB
  - key: lastudio-community/vieneu-v3-native-acoustic
    role: acoustic
    name: VieNeu v3 Native Acoustic NPZ
    purpose: Local acoustic decoder weights for the v3_native pipeline
    defaultFile: acoustic/vieneu_acoustic_weights.npz
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: acoustic/vieneu_acoustic_weights.npz
            size: 54 MB
  - key: lastudio-community/moss-codec-decode
    role: codec_decode
    name: MOSS Audio Tokenizer Decoder ONNX
    purpose: Decode generated MOSS audio codes into 48 kHz waveform
    defaultFile: codec/moss_audio_tokenizer_decode_full.onnx
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: codec/moss_audio_tokenizer_decode_full.onnx
            size: 666 KB
  - key: lastudio-community/moss-codec-decode-data
    role: codec_decode_data
    name: MOSS Audio Tokenizer Decoder Shared Data
    purpose: External ONNX tensor data required by the MOSS decoder graph
    defaultFile: codec/moss_audio_tokenizer_decode_shared.data
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: codec/moss_audio_tokenizer_decode_shared.data
            size: 44.2 MB
  - key: lastudio-community/moss-codec-encode
    role: codec_encode
    name: MOSS Audio Tokenizer Encoder ONNX
    purpose: Encode reference audio into MOSS audio codes for voice cloning
    defaultFile: codec/moss_audio_tokenizer_encode.onnx
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: codec/moss_audio_tokenizer_encode.onnx
            size: 797 KB
  - key: lastudio-community/moss-codec-encode-data
    role: codec_encode_data
    name: MOSS Audio Tokenizer Encoder Data
    purpose: External ONNX tensor data required by the MOSS encoder graph
    defaultFile: codec/moss_audio_tokenizer_encode.data
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: codec/moss_audio_tokenizer_encode.data
            size: 44.5 MB
  - key: lastudio-community/vieneu-v3-voices
    role: voices
    name: VieNeu v3 Preset Voices
    purpose: Preset voice definitions for the v3_native pipeline
    defaultFile: voices_v3_turbo.json
    sources:
      - type: huggingface
        user: lastudio-community
        repo: VieNeu-TTS-v3-Turbo-CPP
        files:
          - name: voices_v3_turbo.json
            size: 115 KB
metadataOverrides:
  domain: tts
  architectures:
    - vieneu-v3-turbo
  compatibilityTypes:
    - gguf
    - npz
    - onnx-codec
  paramsStrings:
    - 131M
  capabilities:
    - tts
    - voice-cloning
  vision: false
laStudio:
  id: vieneu-tts-v3-turbo
  type: tts
  localDir: vieneu-tts-v3-turbo
  shortName: VN3
  title: VieNeu-TTS v3 Turbo
  subtitle: 48 kHz Vietnamese-English TTS & cloning
  description: VieNeu-TTS v3 Turbo is a Vietnamese-English TTS model with preset voices, reference-audio cloning, and the v3_native C++ runtime pipeline.
  accent: "#ff9100"
  capabilities:
    - tts
    - voice-cloning
  supportsTts: true
  supportsCloning: true
  tags:
    - GGUF
    - Native
    - Vietnamese
    - Voice Cloning
    - 48 kHz
  strengths:
    - Native C++ runtime path
    - Exact inference progress reporting
    - Built-in preset voices
    - Reference-audio cloning
    - English-Vietnamese code switching
  weaknesses:
    - Early access upstream model
    - GPU runtime packages are large
  supportedLanguages:
    - text: Vietnamese (vi)
      value: vi
    - text: English (en)
      value: en
  parameterDefinitions:
    voice:
      name: Voice
      type: choice
      description: Select a built-in VieNeu v3 preset voice.
    temperature:
      name: Temperature
      type: float
      min: 0.1
      max: 2.0
      default: 0.45
      description: "Randomness of generation. Lower values are more stable for short preset-voice prompts."
    top_k:
      name: Top K
      type: int
      min: 1
      max: 100
      default: 15
      description: Limit token selection to top K candidates.
    top_p:
      name: Top P
      type: float
      min: 0.0
      max: 1.0
      default: 0.85
      description: Nucleus sampling threshold.
    max_new_frames:
      name: Max New Frames
      type: int
      min: 16
      max: 1200
      default: 160
      description: Maximum generated acoustic frames per chunk.
      advanced: true
    repetition_penalty:
      name: Repetition Penalty
      type: float
      min: 1.0
      max: 2.0
      default: 1.2
      description: Penalize repeated audio codes.
      advanced: true
    max_chars:
      name: Max Chars
      type: int
      min: 50
      max: 1000
      default: 384
      description: Maximum characters per text segment.
      advanced: true
    apply_watermark:
      name: Apply Watermark
      type: bool
      default: true
      description: Request watermarking when supported by the runtime.
      advanced: true
  runtimes:
    - id: vieneu-tts-win-x86_64-cpu
      engineFamily: vieneu-tts
      backend: vieneu-tts
      pipelineProfile: vieneu-v3-native
      label: CPU
      name: CPU VieNeu-TTS v3 Native Runtime (x64)
      asset: vieneu-tts-win-cpu.zip
      library: vieneu-tts.dll
      version: v0.1.1
      source: https://github.com/dduongtrandai/VieNeu-TTS.cpp/releases/download/
    - id: vieneu-tts-win-x86_64-cuda
      engineFamily: vieneu-tts
      backend: vieneu-tts
      pipelineProfile: vieneu-v3-native
      label: CUDA
      name: CUDA 12 VieNeu-TTS v3 Native Runtime (x64)
      asset: vieneu-tts-win-cuda-12.zip
      library: vieneu-tts.dll
      version: v0.1.1
      source: https://github.com/dduongtrandai/VieNeu-TTS.cpp/releases/download/
    - id: vieneu-tts-win-x86_64-vulkan
      engineFamily: vieneu-tts
      backend: vieneu-tts
      pipelineProfile: vieneu-v3-native
      label: Vulkan
      name: Vulkan VieNeu-TTS v3 Native Runtime (x64)
      asset: vieneu-tts-win-vulkan.zip
      library: vieneu-tts.dll
      version: v0.1.1
      source: https://github.com/dduongtrandai/VieNeu-TTS.cpp/releases/download/
  studio:
    tts:
      layout: tts
      action: synthesize
      inputs:
        - text
      parameters:
        - voice
        - temperature
        - top_k
        - top_p
        - max_new_frames
        - repetition_penalty
        - max_chars
        - apply_watermark
      nonVerbalTags:
        - text: "[cười]"
          value: "[cười]"
          description: Tiếng cười, cue cảm xúc thử nghiệm của VieNeu v3.
        - text: "[thở dài]"
          value: "[thở dài]"
          description: Tiếng thở dài, cue phi ngôn từ thử nghiệm của VieNeu v3.
        - text: "[hắng giọng]"
          value: "[hắng giọng]"
          description: Tiếng hắng giọng, cue phi ngôn từ thử nghiệm của VieNeu v3.
    voice-cloning:
      layout: voice-cloning
      action: clone
      inputs:
        - text
        - ref_audio
      parameters:
        - temperature
        - top_k
        - top_p
        - max_new_frames
        - repetition_penalty
        - max_chars
        - apply_watermark
      nonVerbalTags:
        - text: "[cười]"
          value: "[cười]"
          description: Tiếng cười, cue cảm xúc thử nghiệm của VieNeu v3.
        - text: "[thở dài]"
          value: "[thở dài]"
          description: Tiếng thở dài, cue phi ngôn từ thử nghiệm của VieNeu v3.
        - text: "[hắng giọng]"
          value: "[hắng giọng]"
          description: Tiếng hắng giọng, cue phi ngôn từ thử nghiệm của VieNeu v3.
